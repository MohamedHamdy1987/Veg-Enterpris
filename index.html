<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام المحل</title>
  <style>
    button { padding: 16px 32px; margin: 8px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>نظام إدارة الخضار والفواكه</h1>
  <button onclick="document.getElementById('authModal').style.display='flex'">تسجيل الدخول</button>
  <button onclick="document.getElementById('authModal').style.display='flex'">جرب مجاناً</button>

  <!-- نافذة منبثقة بسيطة -->
  <div id="authModal" style="display: none; position: fixed; top: 30%; right: 30%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;">
    <h2>تسجيل الدخول</h2>
    <input type="email" placeholder="البريد الإلكتروني" style="display: block; margin: 10px 0; padding: 10px; width: 250px;">
    <input type="password" placeholder="كلمة المرور" style="display: block; margin: 10px 0; padding: 10px; width: 250px;">
    <button onclick="alert('تم محاولة الدخول')">دخول</button>
    <button onclick="document.getElementById('authModal').style.display='none'">إغلاق</button>
  </div>
</body>
</html>
