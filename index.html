<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Souq SaaS</title>

<!-- ✅ مهم جدًا: مكتبة Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  color: red;
}
</style>
</head>

<body>

<div class="box">
  <h2>Souq SaaS</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">تسجيل دخول</button>
  <button onclick="signup()">إنشاء حساب</button>

  <p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "https://oawtdxkylwujcvdzfasn.supabase.co";
const SUPABASE_KEY = "حط المفتاح هنا";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// لو المستخدم مسجل قبل كده → يدخل على طول
(async () => {
  const { data } = await supabase.auth.getSession();
  if (data.session) {
    window.location.href = "app.html";
  }
})();

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) return show(error.message);

  window.location.href = "app.html";
}

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) return show(error.message);

  show("تم إنشاء الحساب ✔");
}

function show(msg) {
  document.getElementById("msg").innerText = msg;
}
</script>

</body>
</html>
