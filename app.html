<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Souq SaaS</title>

<link rel="stylesheet" href="style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- Offline Badge -->
<div id="offline-badge" class="offline-badge">⚠️ بدون إنترنت</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Auth Screen -->
<div id="auth-screen" class="auth-screen hidden">

  <div class="auth-card">
    <h2>Souq SaaS</h2>

    <div class="auth-tabs">
      <button onclick="App.Auth.showTab('login')" class="auth-tab active">دخول</button>
      <button onclick="App.Auth.showTab('register')" class="auth-tab">حساب جديد</button>
    </div>

    <!-- Login -->
    <div id="tab-login">
      <input id="login-email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button onclick="App.Auth.login()">تسجيل الدخول</button>
    </div>

    <!-- Register -->
    <div id="tab-register" class="hidden">
      <input id="reg-name" placeholder="الاسم">
      <input id="reg-email" placeholder="Email">
      <input id="reg-password" type="password" placeholder="Password">
      <input id="reg-shop" placeholder="اسم المحل">
      <button onclick="App.Auth.register()">إنشاء حساب</button>
    </div>

  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div id="topbar-shop-name">...</div>
      <div id="topbar-plan"></div>
    </div>
    <button onclick="App.Auth.logout()">خروج</button>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" data-page="dashboard" onclick="App.Nav.go('dashboard')">الرئيسية</button>
    <button class="nav-btn" data-page="parties" onclick="App.Nav.go('parties')">الأطراف</button>
    <button class="nav-btn" data-page="invoices" onclick="App.Nav.go('invoices')">الفواتير</button>
    <button class="nav-btn" data-page="payments" onclick="App.Nav.go('payments')">المدفوعات</button>
    <button class="nav-btn" data-page="reports" onclick="App.Nav.go('reports')">التقارير</button>
  </div>

  <!-- ================= DASHBOARD ================= -->
  <div id="page-dashboard" class="page active">
    <h2>لوحة التحكم</h2>

    <div class="stats-grid">
      <div class="stat-card">الكاش<br><span id="stat-cash">0</span></div>
      <div class="stat-card">المبيعات<br><span id="stat-sales">0</span></div>
      <div class="stat-card">العملاء<br><span id="stat-customer-ar">0</span></div>
      <div class="stat-card">الموردين<br><span id="stat-supplier-ap">0</span></div>
    </div>

    <h3>آخر الفواتير</h3>
    <div id="recent-invoices"></div>
  </div>

  <!-- ================= PARTIES ================= -->
  <div id="page-parties" class="page">
    <h2>الأطراف</h2>

    <div class="tabs">
      <button class="party-tab-btn active" data-type="customer" onclick="App.Parties.setType('customer')">عملاء</button>
      <button class="party-tab-btn" data-type="supplier" onclick="App.Parties.setType('supplier')">موردين</button>
    </div>

    <input placeholder="بحث..." oninput="App.Parties.search(this.value)">

    <button onclick="App.Parties.openNew()">+ إضافة</button>

    <div id="parties-list"></div>
  </div>

  <!-- ================= INVOICES ================= -->
  <div id="page-invoices" class="page">
    <h2>الفواتير</h2>

    <div class="tabs">
      <button class="inv-type-btn active" data-t="all" onclick="App.Invoices.setFilter('all')">الكل</button>
      <button class="inv-type-btn" data-t="sale" onclick="App.Invoices.setFilter('sale')">بيع</button>
      <button class="inv-type-btn" data-t="purchase" onclick="App.Invoices.setFilter('purchase')">شراء</button>
    </div>

    <button onclick="App.Invoices.openNew()">+ فاتورة جديدة</button>

    <div id="invoices-list"></div>
  </div>

  <!-- ================= PAYMENTS ================= -->
  <div id="page-payments" class="page">
    <h2>المدفوعات</h2>

    <button onclick="App.Payments.openNew()">+ حركة مالية</button>

    <div class="totals">
      <div>قبض اليوم: <span id="pay-receipts-today">0</span></div>
      <div>مصروف اليوم: <span id="pay-expenses-today">0</span></div>
    </div>

    <div id="payments-list"></div>
  </div>

  <!-- ================= REPORTS ================= -->
  <div id="page-reports" class="page">
    <h2>التقارير</h2>

    <input type="date" id="rep-from">
    <input type="date" id="rep-to">

    <button onclick="App.Reports.load()">عرض التقرير</button>

    <div id="report-output"></div>
  </div>

</div>

<!-- ================= OVERLAYS ================= -->

<!-- Party -->
<div id="overlay-party" class="overlay">
  <div class="sheet">
    <h3 id="party-sheet-title">طرف</h3>

    <input id="party-id" type="hidden">
    <select id="party-type">
      <option value="customer">عميل</option>
      <option value="supplier">مورد</option>
    </select>

    <input id="party-name" placeholder="الاسم">
    <input id="party-phone" placeholder="الموبايل">
    <input id="party-notes" placeholder="ملاحظات">
    <input id="party-commission" placeholder="العمولة %">

    <button onclick="App.Parties.save()">حفظ</button>
    <button onclick="App.closeOverlay('party')">إغلاق</button>
  </div>
</div>

<!-- Invoice -->
<div id="overlay-invoice" class="overlay">
  <div class="sheet">

    <h3>فاتورة</h3>

    <input id="inv-id" type="hidden">

    <select id="inv-type" onchange="App.Invoices.onTypeChange()">
      <option value="sale">بيع</option>
      <option value="purchase">شراء</option>
    </select>

    <label id="inv-party-label">العميل</label>
    <select id="inv-party"></select>

    <input type="date" id="inv-date">

    <div id="inv-items-list"></div>

    <button onclick="App.Invoices.addItem()">+ صنف</button>

    <div class="totals">
      الإجمالي: <span id="inv-subtotal">0</span><br>
      العمولة: <span id="inv-commission">0</span><br>
      المصاريف: <span id="inv-expenses">0</span><br>
      الصافي: <span id="inv-net">0</span>
    </div>

    <button onclick="App.Invoices.save()">حفظ</button>
    <button id="inv-confirm-btn" onclick="App.Invoices.confirm()">ترحيل</button>

    <button onclick="App.closeOverlay('invoice')">إغلاق</button>

  </div>
</div>

<!-- Payment -->
<div id="overlay-payment" class="overlay">
  <div class="sheet">

    <h3>حركة مالية</h3>

    <select id="pay-type" onchange="App.Payments.onTypeChange()">
      <option value="customer_receipt">قبض من عميل</option>
      <option value="supplier_payment">دفع لمورد</option>
    </select>

    <div id="pay-party-group">
      <label id="pay-party-label">الطرف</label>
      <select id="pay-party"></select>
    </div>

    <input id="pay-amount" placeholder="المبلغ">
    <input type="date" id="pay-date">
    <input id="pay-notes" placeholder="ملاحظات">

    <button onclick="App.Payments.save()">حفظ</button>
    <button onclick="App.closeOverlay('payment')">إغلاق</button>

  </div>
</div>

<!-- Item Template -->
<template id="inv-item-tpl">
  <div class="inv-item-row">
    <input class="item-product" placeholder="الصنف">
    <input class="item-qty" placeholder="الكمية" oninput="App.Invoices.calcTotals()">
    <input class="item-price" placeholder="السعر" oninput="App.Invoices.calcTotals()">
    <button onclick="App.Invoices.removeItem(this)">حذف</button>
  </div>
</template>

<!-- Script -->
<script src="app.js"></script>

</body>
</html>
